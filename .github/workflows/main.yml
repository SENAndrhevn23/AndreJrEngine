name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  buildLinux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.1.7

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.3

      - name: Install Haxelib + Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvlc-dev libvlccore-dev

          haxelib setup ~/haxelib
          haxelib install lime 8.0.1
          haxelib install openfl 9.3.2
          haxelib install flixel 5.5.0
          haxelib install flixel-addons 3.2.1
          haxelib install flixel-tools 1.5.1
          haxelib install flixel-ui 2.5.0
          haxelib install hxcpp-debug-server 1.2.4
          haxelib install tjson 1.4.0
          haxelib install hxCodec 2.6.1
          haxelib install hxdiscord_rpc 1.1.1
          haxelib install hscript
          haxelib git linc_luajit https://github.com/superpowers04/linc_luajit 8c20c7adcb7ce9d7ebc83de10208bff96e3cb5d0

      - name: Create Version Tag
        run: echo "${{ github.run_id }}" > VERSION

      - name: Compile
        run: haxelib run lime build Project.xml linux --app-version="4.0.0-${{ github.run_id }}"

      - name: Upload Linux Build
        uses: actions/upload-artifact@v2.2.4
        with:
          name: linuxBuild
          path: export/release/linux/bin


  buildWindows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4.1.7

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.3

      - name: Install Haxelib + Dependencies
        run: |
          haxelib setup C:/haxelib
          haxelib install lime 8.0.1
          haxelib install openfl 9.3.2
          haxelib install flixel 5.5.0
          haxelib install flixel-addons 3.2.1
          haxelib install flixel-tools 1.5.1
          haxelib install flixel-ui 2.5.0
          haxelib install hxcpp-debug-server 1.2.4
          haxelib install tjson 1.4.0
          haxelib install hxCodec 2.6.1
          haxelib install hxdiscord_rpc 1.1.1
          haxelib install hscript
          haxelib git linc_luajit https://github.com/superpowers04/linc_luajit 8c20c7adcb7ce9d7ebc83de10208bff96e3cb5d0
        shell: cmd

      - name: Create Version Tag
        run: echo "${{ github.run_id }}" > VERSION
        shell: cmd

      - name: Compile
        run: haxelib run lime build windows --app-version="4.0.0-${{ github.run_id}}"
        shell: cmd

      - name: Upload Windows Build
        uses: actions/upload-artifact@v2.2.4
        with:
          name: windowsBuild
          path: export/release/windows/bin
